<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtBox - Товар</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/product-info.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header__inner">
                <a href="index.html" class="logo">
                    <span class="logo__text">ArtBox</span>
                </a>
                <nav class="nav" id="nav">
                    <ul class="nav__list">
                        <li class="nav__item"><a href="index.html" class="nav__link">Главная</a></li>
                        <li class="nav__item"><a href="catalog.html" class="nav__link">Каталог</a></li>
                        <li class="nav__item"><a href="about.html" class="nav__link">О нас</a></li>
                        <li class="nav__item"><a href="contacts.html" class="nav__link">Контакты</a></li>
                    </ul>
                </nav>
                <div class="header__actions">
                    <div class="search">
                        <input type="text" class="search__input" placeholder="Поиск...">
                        <button class="search__btn">
                            <img src="assets/img/header-search-input-icon.png" alt="Поиск">
                        </button>
                    </div>
                    <div class="actions">
                        <button class="action-btn" id="profile-btn">
                            <img src="assets/img/header-profile-icon.png" alt="Профиль">
                        </button>
                        <button class="action-btn" id="favorites-btn">
                            <img src="assets/img/header-favoruite-icon.png" alt="Избранное">
                        </button>
                        <button class="action-btn" id="cart-btn">
                            <img src="assets/img/header-basket-icon.png" alt="Корзина">
                        </button>
                    </div>
                    <button class="burger" id="burger">
                        <span></span><span></span><span></span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="breadcrumbs">
                <a href="catalog.html" class="breadcrumbs__link">← Назад к каталогу</a>
            </div>
            
            <div class="product-details" id="product-details"></div>
            
            <div class="product-tabs">
                <div class="tabs-nav">
                    <button class="tab-btn active" data-tab="description">📖 Описание</button>
                    <button class="tab-btn" data-tab="specifications">📋 Характеристики</button>
                </div>
                <div class="tabs-content">
                    <div class="tab-panel active" id="description"></div>
                    <div class="tab-panel" id="specifications"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer__inner">
                <div class="footer__brand">
                    <div class="footer-logo">
                        <img src="assets/img/footer-paint-icon.png" alt="ArtBox">
                        <span class="footer-logo__text">ArtBox</span>
                    </div>
                    <p class="footer__description">Все для творчества в одном месте.</p>
                </div>
                <div class="footer__nav">
                    <div class="footer__column">
                        <h3 class="footer__title">Каталог</h3>
                        <ul class="footer__list">
                            <li><a href="catalog.html?category=paints">Краски</a></li>
                            <li><a href="catalog.html?category=brushes">Кисти</a></li>
                            <li><a href="catalog.html?category=canvases">Холсты</a></li>
                        </ul>
                    </div>
                    <div class="footer__column">
                        <h3 class="footer__title">Информация</h3>
                        <ul class="footer__list">
                            <li><a href="about.html">О нас</a></li>
                            <li><a href="contacts.html">Контакты</a></li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="footer__bottom">
                <p class="footer__copyright">© 2024 ArtBox. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <div class="modal" id="login-modal">
        <div class="modal__content">
            <button class="modal__close" id="close-login-modal">&times;</button>
            <div class="modal__tabs">
                <button class="modal__tab modal__tab--active" data-tab="login">Вход</button>
                <button class="modal__tab" data-tab="register">Регистрация</button>
            </div>
            <div class="modal__body">
                <form class="modal__form modal__form--active" id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Пароль</label>
                        <input type="password" id="login-password" class="form-input" required>
                    </div>
                    <button type="submit" class="btn btn--primary btn--full">Войти</button>
                </form>
                <form class="modal__form" id="register-form">
                    <div class="form-group">
                        <label for="register-name">Имя</label>
                        <input type="text" id="register-name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Пароль</label>
                        <input type="password" id="register-password" class="form-input" required>
                    </div>
                    <button type="submit" class="btn btn--primary btn--full">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="assets/js/script.js"></script>
    <script type="module" src="assets/js/product-info.js"></script>
</body>
</html>
