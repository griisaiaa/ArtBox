<!DOCTYPE html>
<html>
<head>
    <title>Инициализация товаров</title>
    <style>
        body { font-family: Arial; padding: 20px; text-align: center; }
        .success { color: green; margin: 10px 0; }
        .error { color: red; margin: 10px 0; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Загрузка товаров в Firebase</h1>
    <div id="status"></div>
    <button id="loadBtn">Загрузить товары</button>
    
    <script type="module">
        import { db, collection, addDoc, getDocs } from './assets/js/firebase-config.js';
        
        const products = [
            {
                name: "Набор акриловых красок 24 цвета",
                category: "paints",
                price: 1299,
                oldPrice: 1699,
                rating: 5,
                reviews: 150,
                image: "./assets/img/product-cart-img1.png",
                inStock: 45,
                description: "Профессиональный набор акриловых красок. 24 ярких цвета. Идеально подходит для художников любого уровня. Краски легко смешиваются, быстро сохнут и создают стойкое покрытие.",
                specifications: { Бренд: "ArtMaster", Объем: "20 мл x 24", Тип: "Акриловые", Страна: "Россия" }
            },
            {
                name: "Профессиональные кисти для живописи, 12 шт",
                category: "brushes",
                price: 899,
                rating: 4,
                reviews: 200,
                image: "./assets/img/product-cart-img2.png",
                inStock: 23,
                description: "Набор профессиональных кистей. 12 штук разных размеров и форм. Подходят для акрила, масла и акварели. Ворс высокой прочности, не теряет форму.",
                specifications: { Бренд: "ProArt", Материал: "Синтетика", Размеры: "№2,4,6,8,10,12", Количество: "12 шт" }
            },
            {
                name: "Акварельные краски 36 цветов",
                category: "paints",
                price: 1599,
                rating: 5,
                reviews: 107,
                image: "./assets/img/product-cart-img4.png",
                inStock: 12,
                description: "Набор акварельных красок. 36 насыщенных цветов. Отличная растворимость водой. Яркие и прозрачные цвета. Идеально для акварельной живописи.",
                specifications: { Бренд: "ArtistPro", Объем: "2.5 мл x 36", Тип: "Акварельные", Страна: "Германия" }
            },
            {
                name: "Холст на подрамнике 40x50 см",
                category: "canvases",
                price: 549,
                rating: 4,
                reviews: 90,
                image: "./assets/img/product-cart-img3.png",
                inStock: 67,
                description: "Холст на подрамнике. Размер 40x50 см. Льняное полотно средней зернистости. Уже натянут на деревянный подрамник. Готов к работе сразу после покупки.",
                specifications: { Размер: "40x50 см", Материал: "Лен", Зернистость: "Средняя", Страна: "Россия" }
            },
            {
                name: "Масляные краски MasterOil 12 цветов",
                category: "paints",
                price: 1899,
                oldPrice: 2299,
                rating: 5,
                reviews: 78,
                image: "./assets/img/product-cart-img1.png",
                inStock: 34,
                description: "Набор масляных красок премиум качества. 12 основных цветов. Краски имеют насыщенный пигмент, отличную укрывистость и светостойкость.",
                specifications: { Бренд: "MasterOil", Объем: "40 мл x 12", Тип: "Масляные", Страна: "Италия" }
            },
            {
                name: "Набор пастельных мелков 64 цвета",
                category: "stationery",
                price: 2499,
                rating: 5,
                reviews: 45,
                image: "./assets/img/product-cart-img4.png",
                inStock: 18,
                description: "Профессиональная сухая пастель. 64 ярких цвета. Мягкая, хорошо растушевывается. Подходит для художественных работ.",
                specifications: { Бренд: "CreativeLine", Количество: "64 цвета", Тип: "Сухая пастель", Страна: "Франция" }
            },
            {
                name: "Скетчбук для рисования А5 120 листов",
                category: "stationery",
                price: 349,
                rating: 4,
                reviews: 230,
                image: "./assets/img/product-cart-img2.png",
                inStock: 156,
                description: "Скетчбук на спирали. Плотная бумага 120 г/м². Подходит для карандашей, маркеров и легкой акварели.",
                specifications: { Формат: "А5", Листов: "120", Бумага: "120 г/м²", Крепление: "Спираль" }
            },
            {
                name: "Кисти синтетика круглые 6 шт",
                category: "brushes",
                price: 449,
                rating: 4,
                reviews: 112,
                image: "./assets/img/product-cart-img3.png",
                inStock: 45,
                description: "Набор круглых кистей из синтетического ворса. Идеальны для акварели и акрила. Упругие и эластичные.",
                specifications: { Материал: "Синтетика", Форма: "Круглые", Количество: "6 шт", Размеры: "№1,3,5,7,9,11" }
            }
        ];
        
        document.getElementById('loadBtn').addEventListener('click', async () => {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '<p>Проверка существующих товаров...</p>';
            
            try {
                const existing = await getDocs(collection(db, "products"));
                
                if (!existing.empty) {
                    statusDiv.innerHTML += `<p class="error">⚠️ Товары уже существуют (${existing.size} шт.)</p>`;
                    statusDiv.innerHTML += `<p><a href="catalog.html">Перейти в каталог →</a></p>`;
                    return;
                }
                
                statusDiv.innerHTML = '<p>Загрузка товаров...</p>';
                
                for (const product of products) {
                    await addDoc(collection(db, "products"), product);
                    statusDiv.innerHTML += `<p class="success">✓ Добавлен: ${product.name}</p>`;
                }
                
                statusDiv.innerHTML += `<p class="success"><strong>✅ Все товары успешно загружены! (${products.length} шт.)</strong></p>`;
                statusDiv.innerHTML += `<p><a href="catalog.html" style="display: inline-block; margin-top: 20px; padding: 10px 20px; background: #FF6B35; color: white; text-decoration: none; border-radius: 5px;">Перейти в каталог →</a></p>`;
                
            } catch (error) {
                statusDiv.innerHTML += `<p class="error">❌ Ошибка: ${error.message}</p>`;
                console.error(error);
            }
        });
    </script>
</body>
</html>
